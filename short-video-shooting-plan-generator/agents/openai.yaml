interface:
  display_name: "Short Video Shooting Plan Generator"
  short_description: "生成可直接指导达人拍摄的 TikTok Shop 中文带货分镜方案，并附带 1 条 Seedance 视频生成提示词。"
  default_prompt: "使用 $short-video-shooting-plan-generator：基于商品名和一级类目生成 TikTok Shop 带货短视频拍摄方案，目标是给达人一份高曝光、高转化、可直接开拍的脚本，并在结果最后默认附带 1 条可直接用于 Seedance 的视频生成提示词。结果需全中文；达人口播文案按中文在上、英文在下双语两行输出；整体包含一句话总结、视频简报、2 个 Hook、6-8 个镜头、软性转化设计、合规说明，以及放在最后的 Seedance 视频生成提示词。"
